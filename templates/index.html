<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RESUME ANALYZER</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #8e44ad;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
            --border-color: #dcdde1;
            --drop-bg: #f9f9f9;
            --toggle-bg: #8e44ad;
            --toggle-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #1e1e2e;
            --card-bg: #2d2d44;
            --text-color: #f5f6fa;
            --border-color: #4b4b61;
            --drop-bg: #35354e;
            --toggle-bg: #ffffff;
            --toggle-text: #8e44ad;
        }

        body {
            font-family: 'Roboto';
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: 0.3s ease;
            margin: 0; padding: 20px;
        }

        .container { max-width: 850px; margin: auto; }

        .header-section { text-align: center; margin-bottom: 30px; }
        h1 { font-weight: 700; color: var(--primary-purple); text-transform: uppercase; margin: 0; }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background-color: var(--toggle-bg);
            color: var(--toggle-text);
            border: 2px solid var(--primary-purple); 
            padding: 10px 20px;
            border-radius: 25px; cursor: pointer;
            font-weight: 700; font-family: 'Roboto';
            transition: all 0.3s ease;
        }

        .card {
            background: var(--card-bg);
            padding: 35px; border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }

        /* Drag & Drop Box */
        .drop-zone {
            border: 2px dashed var(--primary-purple);
            background: var(--drop-bg);
            padding: 40px; border-radius: 10px;
            text-align: center; cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .drop-zone.dragover { background: rgba(142, 68, 173, 0.1); border-style: solid; }
        #file-name { display: block; margin-top: 10px; font-weight: 700; color: var(--primary-purple); }

        /* Loading Spinner */
        #status-container { text-align: center; margin-top: 20px; display: none; }
        #status-text { font-weight: 700; color: var(--primary-purple); font-size: 1.1em; }
        
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(142, 68, 173, 0.2);
            border-top: 4px solid var(--primary-purple); border-radius: 50%;
            margin: 15px auto; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Formatting */
        .meter-container { background: #e0e0e0; height: 12px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .meter-bar { height: 100%; background: var(--primary-purple); width: 0%; transition: 1.5s ease-in-out; }

        .section-header { display: block; font-weight: 700; font-size: 1.3em; color: var(--primary-purple); text-decoration: underline; margin-top: 25px; margin-bottom: 8px; text-transform: uppercase; }
        .sub-topic { display: block; font-weight: 700; font-size: 1.05em; margin-top: 15px; color: var(--text-color); }
        
        .action-btn {
            background: var(--primary-purple); color: white; border: none;
            padding: 14px 25px; border-radius: 8px; cursor: pointer; 
            font-weight: 700; width: 100%; font-size: 1em; font-family: 'Roboto';
        }

        textarea { 
            width: 100%; padding: 15px; border-radius: 8px; 
            border: 1px solid var(--border-color); background: transparent; 
            color: var(--text-color); font-family: 'Roboto'; font-weight: 400;
            box-sizing: border-box; resize: vertical;
        }

        .secondary-btn {
            background: transparent; color: var(--primary-purple);
            border: 2px solid var(--primary-purple); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 700;
        }
    </style>
</head>
<body data-theme="light">

<button class="theme-toggle" id="modeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>

<div class="container">
    <div class="header-section">
        <h1>AI RESUME ANALYZER</h1>
    </div>

    <div class="card">
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <textarea name="job_description" id="jd_input" rows="5" placeholder="Paste the Job Description here..."></textarea>
            <br><br>
            
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <p style="font-weight: 400;">Drag & Drop Resume (PDF) or Click to Upload</p>
                <span id="file-name">No file selected</span>
                <input type="file" name="resume" id="fileInput" accept=".pdf" style="display:none" onchange="updateFileName()">
            </div>

            <button type="button" class="action-btn" id="analyzeBtn" onclick="processAndSubmit()">ANALYZE MATCH</button>

            <div id="status-container">
                <div id="status-text"></div>
                <div class="spinner" id="loadingSpinner"></div>
                <p style="color: #e67e22; font-size: 0.9em; font-weight: 400; margin-top: 10px;">⚠️ Please wait 60s between requests to prevent API Rate Limits.</p>
            </div>
        </form>

        {% if report %}
        <div id="resultBlock">
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border-color);">
            <h2 style="font-weight: 700;">Match Score: <span id="scoreVal">{{ score }}</span>%</h2>
            <div class="meter-container">
                <div id="bar" class="meter-bar"></div>
            </div>

            <div id="finalReport" style="font-weight: 400;">
                {{ report }}
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button class="secondary-btn" onclick="copyText()">Copy Report</button>
                <button class="secondary-btn" onclick="saveAsPDF()">Download PDF</button>
            </div>
        </div>
        {% endif %}
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('modeBtn');
        if (body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = "☀️ Light Mode";
        } else {
            body.setAttribute('data-theme', 'light');
            btn.innerHTML = "🌙 Dark Mode";
        }
    }

    function updateFileName() {
        const input = document.getElementById('fileInput');
        const display = document.getElementById('file-name');
        if (input.files.length > 0) {
            display.innerText = input.files[0].name;
        }
    }

    // Drag & Drop Bridge
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, e => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    ['dragenter', 'dragover'].forEach(name => {
        dropZone.addEventListener(name, () => dropZone.classList.add('dragover'));
    });

    ['dragleave', 'drop'].forEach(name => {
        dropZone.addEventListener(name, () => dropZone.classList.remove('dragover'));
    });

    dropZone.addEventListener('drop', e => {
        fileInput.files = e.dataTransfer.files;
        updateFileName();
    });

    // The Validation and Timer
    function processAndSubmit() {
        const jdValue = document.getElementById('jd_input').value.trim();
        const hasFile = document.getElementById('fileInput').files.length > 0;

        if (!jdValue || !hasFile) {
            alert("Please paste a Job Description and upload your Resume first.");
            return;
        }

        const btn = document.getElementById('analyzeBtn');
        const container = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loadingSpinner');

        btn.disabled = true;
        btn.style.opacity = "0.5";
        container.style.display = "block";

        let timeLeft = 3;
        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                statusText.innerText = "Processing with AI... Please wait.";
                spinner.style.display = "block";
                document.getElementById('uploadForm').submit();
            } else {
                statusText.innerText = `Comparing in ${timeLeft}s...`;
                timeLeft--;
            }
        }, 1000);
    }

    window.onload = function() {
        const score = document.getElementById('scoreVal')?.innerText;
        if(score) document.getElementById('bar').style.width = score + "%";

        let reportDiv = document.getElementById('finalReport');
        if(reportDiv) {
            let text = reportDiv.innerHTML;
            let formatted = text
                .replace(/SECTION:(.*?)(?=SECTION:|SUBTOPIC:|$)/gs, '<span class="section-header">$1</span>')
                .replace(/SUBTOPIC:(.*?)(?=SECTION:|SUBTOPIC:|$)/gs, '<span class="sub-topic">$1</span>');
            reportDiv.innerHTML = formatted;
        }
    };

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('finalReport').innerText);
        alert("Report copied!");
    }

    function saveAsPDF() {
        html2pdf().from(document.getElementById('resultBlock')).save('Analysis_Report.pdf');
    }
</script>

</body>
</html>
